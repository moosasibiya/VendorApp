services:
  db:
    image: postgres:15
    container_name: vendorapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vendorapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - vendorapp_db_data_pg15:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vendorapp_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - vendorapp_redis_data:/data

volumes:
  vendorapp_db_data_pg15:
  vendorapp_redis_data:
